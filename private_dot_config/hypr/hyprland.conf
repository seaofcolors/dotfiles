###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more

# Quit Apps                 Shift-Q

# Menu                      Space
# Clipboard                 Shift-C
# Screen Config             Shift-S
# Btrfs Assistant

# System Monitor / Htop     S
# LibreWolf                 L
# Proton Mail               M
# Proton Pass               P
# Ente Auth                 A
# Proton VPN                V

# Recoll                    R
# Terminal                  T
# Dolphin                   F
# Kate                      K

# Zettlr                    Z
# Zotero                    U
# LibreOffice Writer        W
# Firefox with Zotero Plugin   nix

# Hugin                     H
# Darktable                 K
# Digikam                   D
# Ente Photos               E

# Anki                      A

# Qobuz                     Q

# Element                  |
# Signal                   |
# Telegram                 |C
# Whatsapp                 |

# Bluesky                   B

# Opera for Cups            O

# VirtualBox                ?

# Chromium for KL           I
# Steam and games!          G

bind = $mainMod, space, exec, $menu
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod SHIFT, C, exec, cursor-clip

bind = $mainMod, code:59, togglefloating,
bind = $mainMod, code:60, pseudo, # dwindle
bind = $mainMod, code:61, layoutmsg, togglesplit # dwindle

bind = $mainMod, code:35, togglespecialworkspace, magic
bind = $mainMod SHIFT, code:35, movetoworkspace, special:magic

bind = $mainMod, F, exec, $fileManager
bind = $mainMod, T, exec, $terminal
bind = $mainMod SHIFT, S, exec, hyprmoncfg

bind = $mainMod SHIFT, O, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

bind = $mainMod, S, exec, htop 
bind = $mainMod, L, exec, librewolf
bind = $mainMod, M, exec, proton-mail
bind = $mainMod, P, exec, proton-pass
bind = $mainMod, A, exec, enteauth
bind = $mainMod, V, exec, protonvpn-app

bind = $mainMod, R, exec, recoll
bind = $mainMod, K, exec, kate
bind = $mainMod, Z, exec, zettlr
bind = $mainMod, U, exec, zotero
bind = $mainMod, W, exec, libreoffile -writer
bind = $mainMod, H, exec, hugin
bind = $mainMod, K, exec, darktable
bind = $mainMod, D, exec, digikam
bind = $mainMod, E, exec, ente-desktop
bind = $mainMod, A, exec, anki
bind = $mainMod, Q, exec, qobuz
bind = $mainMod, C, exec, signal & element & telegram & whatsapp
bind = $mainMod, B, exec, bluesky
bind = $mainMod, O, exec, opera
bind = $mainMod, I, exec, google-chrome-stable
bind = $mainMod, G, exec, steam





# bind = $mainMod, Q, exec, $terminal
# bind = $mainMod, C, killactive,
# bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
# bind = $mainMod, E, exec, $fileManager
# bind = $mainMod, V, togglefloating,
# bind = $mainMod, R, exec, $menu
# bind = $mainMod, P, pseudo, # dwindle
# bind = $mainMod, J, layoutmsg, togglesplit # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ & swayosd-client --output-volume raise
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- & swayosd-client --output-volume lower
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle & swayosd-client --output-volume mute-toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle & swayosd-client --input-volume mute-toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+ & swayosd-client --brightness +5
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%- & swayosd-client --brightness -5

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next & swayosd-client --playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause & swayosd-client --playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause & swayosd-client --playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous & swayosd-client --playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}




